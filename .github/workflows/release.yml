name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o zed-acp-ollama-${{ matrix.suffix }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-acp-ollama-${{ matrix.suffix }}
          path: zed-acp-ollama-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum zed-acp-ollama-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ## Manual download

            | Platform | Architecture | Binary |
            |---|---|---|
            | macOS | Apple Silicon (M1/M2/M3/M4) | `zed-acp-ollama-darwin-arm64` |
            | macOS | Intel | `zed-acp-ollama-darwin-amd64` |
            | Linux | ARM64 | `zed-acp-ollama-linux-arm64` |
            | Linux | x86_64 | `zed-acp-ollama-linux-amd64` |

            See `checksums.txt` for SHA-256 verification.
          files: |
            zed-acp-ollama-darwin-arm64
            zed-acp-ollama-darwin-amd64
            zed-acp-ollama-linux-arm64
            zed-acp-ollama-linux-amd64
            checksums.txt

  pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - id: deploy
        uses: actions/deploy-pages@v4
